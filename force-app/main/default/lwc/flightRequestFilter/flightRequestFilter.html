<template>
  <lightning-card title="Flight Search">
    <div class="slds-var-p-horizontal_medium slds-var-p-bottom_medium">
      <lightning-input
        label="Origin City"
        name="originCity"
        data-field="originCity"
        value={originCity}
        type="text"
        required
        onchange={handleInputChange}
        read-only={readOnly}
      >
      </lightning-input>

      <lightning-input
        label="Destination City"
        name="destinationCity"
        data-field="destinationCity"
        value={destinationCity}
        type="text"
        required
        onchange={handleInputChange}
        read-only={readOnly}
      >
      </lightning-input>

      <lightning-input
        label="Date of Travel"
        name="dateOfTravel"
        data-field="dateOfTravel"
        value={dateOfTravel}
        type="date"
        required
        onchange={handleInputChange}
        read-only={readOnly}
      >
      </lightning-input>

      <lightning-input
        label="Max Price (1,000 - 20,000)"
        name="price"
        data-field="price"
        value={price}
        type="number"
        min="1000"
        max="20000"
        step="1"
        onchange={handleInputChange}
        read-only={readOnly}
      >
      </lightning-input>

      <lightning-input
        label="Min Discount Percentage (0 - 100)"
        name="discountPercentage"
        data-field="discountPercentage"
        value={discountPercentage}
        type="number"
        min="0"
        max="100"
        step="1"
        onchange={handleInputChange}
        read-only={readOnly}
      >
      </lightning-input>
    </div>
  </lightning-card>
</template>

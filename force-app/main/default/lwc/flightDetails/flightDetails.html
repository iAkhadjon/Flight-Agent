<template>
  <lightning-card icon-name="standard:flight" class="flight-card-container">
    <span class="flightTitle">Available Flights</span>
    <template if:true={hasFlights}>
      <div class="flight-list-container">
        <template for:each={flightData} for:item="flight">
          <article key={flight.key} class="flight-card" data-id="flight-card">
            <div class="flight-info">
              <div>
                <span class="field-label">Flight</span>
                <h2 class="flight-id">{flight.flightId}</h2>
              </div>
              <div class="discount-tag">{flight.formattedDiscount}</div>
            </div>

            <div class="price-duration">
              <div class="price">
                <span class="field-label">Price</span>
                <strong>{flight.formattedPrice}</strong>
              </div>
              <div class="duration">
                <span class="field-label">Duration</span>
                <span>{flight.durationInHr}</span>
              </div>
            </div>

            <div class="flight-timeline">
              <div class="timeline">
                <div class="time-point departure">
                  <span>Departure Time: {flight.departureTime}</span>
                </div>
                <div class="time-point arrival">
                  <span>Arrival Time: {flight.arrivalInHr}</span>
                </div>
              </div>
            </div>

            <div class="additional-info">
              <div class="layovers">
                <lightning-icon
                  icon-name="utility:loop"
                  size="small"
                ></lightning-icon>
                <span>Layovers: {flight.numLayovers}</span>
              </div>
              <div class="pets">
                <lightning-icon
                  icon-name="utility:paw"
                  size="small"
                ></lightning-icon>
                <span>Pets Allowed: {flight.petAllowedStatus}</span>
              </div>
            </div>
          </article>
        </template>
      </div>
    </template>

    <template if:false={hasFlights}>
      <p class="empty-state">No matching results were returned.</p>
    </template>
  </lightning-card>
</template>
